    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .glass-effect {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .skill-card {
            transition: all 0.3s ease;
            border-right: 4px solid transparent;
        }

        .skill-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
            border-right-color: #667eea;
        }

        .category-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .search-input:focus {
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.3);
        }

        .highlight {
            background-color: #fef08a;
            padding: 0 2px;
            border-radius: 2px;
        }

        .fade-in {
            animation: fadeIn 0.5s ease-in;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .category-section {
            scroll-margin-top: 100px;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #764ba2;
        }

        .nav-btn {
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

                </div>
            </div>

                    <i class="fas fa-filter ml-1 text-green-600"></i>
                    نتائج البحث: <span id="searchResults">0</span>
                </span>
            </div>
        </div>
    </header>

        // Initialize
        document.addEventListener('DOMContentLoaded', function () {
            renderContent();
            updateStats();
            setupSearch();
            renderQuickNav();
        });

        function renderContent(filter = '') {
            const container = document.getElementById('content');
            container.innerHTML = '';

            let totalResults = 0;

            skillsData.forEach(category => {
                const filteredSkills = category.skills.filter(skill =>
                    skill.name.toLowerCase().includes(filter.toLowerCase()) ||
                    skill.desc.toLowerCase().includes(filter.toLowerCase()) ||
                    skill.benefit.toLowerCase().includes(filter.toLowerCase()) ||
                    skill.usage.toLowerCase().includes(filter.toLowerCase())
                );

                if (filteredSkills.length === 0 && filter) return;

                totalResults += filteredSkills.length;

                const section = document.createElement('section');
                section.className = `category-section glass-effect rounded-2xl p-6 shadow-lg fade-in mb-8`;
                section.id = category.id;

                const header = document.createElement('div');
                header.className = 'flex items-center gap-3 mb-4 border-b pb-4';
                header.innerHTML = `
                    <div class="w-14 h-14 rounded-xl bg-${category.color}-100 text-${category.color}-600 flex items-center justify-center text-2xl shadow-sm">
                        <i class="fas ${category.icon}"></i>
                    </div>
                    <div class="flex-1">
                        <h2 class="text-2xl font-bold text-gray-800">${category.title}</h2>
                        <p class="text-sm text-${category.color}-600 font-semibold mt-1">${category.subtitle}</p>
                        <p class="text-gray-600 mt-1 text-sm">${category.description}</p>
                    </div>
                    <span class="bg-${category.color}-100 text-${category.color}-700 px-3 py-1 rounded-full text-sm font-bold">
                        ${filteredSkills.length}
                    </span>
                `;
                section.appendChild(header);

                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4';

                filteredSkills.forEach(skill => {
                    const card = createSkillCard(skill, filter);
                    grid.appendChild(card);
                });

                section.appendChild(grid);
                container.appendChild(section);
            });

            if (totalResults === 0 && filter) {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <i class="fas fa-search text-6xl text-gray-300 mb-4"></i>
                        <p class="text-xl text-gray-500">لا توجد نتائج للبحث "${filter}"</p>
                    </div>
                `;
            }

            document.getElementById('searchStats').classList.toggle('hidden', !filter);
            document.getElementById('searchResults').textContent = totalResults;
        }

        function createSkillCard(skill, highlightTerm) {
            const card = document.createElement('div');
            card.className = 'skill-card bg-white rounded-xl p-5 border border-gray-200 hover:border-purple-300 cursor-pointer group';

            const copyText = skill.name;

            card.innerHTML = `
                <div class="flex justify-between items-start mb-3">
                    <code class="text-sm font-bold text-purple-700 bg-purple-50 px-2 py-1 rounded-lg border border-purple-200 group-hover:bg-purple-100 transition-colors">
                        ${highlightText(skill.name, highlightTerm)}
                    </code>
                    <button onclick="copyToClipboard('${copyText}')" class="text-gray-400 hover:text-purple-600 transition-colors" title="نسخ">
                        <i class="far fa-copy"></i>
                    </button>
                </div>
                <p class="text-gray-700 mb-3 font-medium">${highlightText(skill.desc, highlightTerm)}</p>
                <div class="space-y-2">
                    <div class="flex items-center gap-2 text-sm text-green-700 bg-green-50 p-2 rounded-lg">
                        <i class="fas fa-check-circle"></i>
                        <span>${highlightText(skill.benefit, highlightTerm)}</span>
                    </div>
                    <div class="flex items-start gap-2 text-sm text-blue-700 bg-blue-50 p-2 rounded-lg">
                        <i class="fas fa-terminal mt-1"></i>
                        <code class="text-xs break-all">${highlightText(skill.usage, highlightTerm)}</code>
                    </div>
                </div>
            `;

            return card;
        }

        function highlightText(text, term) {
            if (!term) return text;
            const regex = new RegExp(`(${term})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            let debounceTimer;

            searchInput.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    renderContent(e.target.value);
                }, 300);
            });
        }

        function updateStats() {
            document.getElementById('totalCategories').textContent = skillsData.length;
            const totalSkills = skillsData.reduce((acc, cat) => acc + cat.skills.length, 0);
            document.getElementById('totalSkills').textContent = totalSkills;
        }

        function renderQuickNav() {
            const nav = document.getElementById('quickNav');
            skillsData.forEach((cat, index) => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn px-4 py-2 bg-white border border-gray-300 rounded-lg hover:bg-purple-50 hover:border-purple-300 hover:text-purple-700 transition-all text-sm font-medium shadow-sm flex items-center gap-2';
                btn.innerHTML = `
                    <i class="fas ${cat.icon} text-${cat.color}-500"></i>
                    <span>${cat.title}</span>
                `;
                btn.onclick = () => {
                    document.getElementById(cat.id).scrollIntoView({ behavior: 'smooth' });
                };
                nav.appendChild(btn);
            });
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                // Show toast notification
                const toast = document.createElement('div');
                toast.className = 'fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg z-50 fade-in flex items-center gap-2';
                toast.innerHTML = '<i class="fas fa-check text-green-400"></i> تم نسخ المهارة!';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 2000);
            });
        }
    </script>
